name: Build and Release (dev)

on:
  push:
    branches:
      - 'main'
permissions:
  contents: write
jobs:
  build-windows:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.gradle_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1
      - name: Extract Gradle version
        id: gradle_version
        shell: pwsh
        run: |
          $version = .\gradlew.bat properties -q |
            Select-String '^version:' |
            ForEach-Object { ($_ -split '\s+', 2)[1].Trim("'`r`n ") } |
            Select-Object -First 1
          Write-Host "Extracted version: $version"
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Build with Gradle
        run: .\gradlew.bat build
      - name: Upload Windows JAR
        uses: actions/upload-artifact@v4
        with:
          name: devore-windows-jar
          path: build/libs/*.jar
  build-and-release:
    runs-on: ubuntu-latest
    needs: build-windows
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Download Windows JAR
        uses: actions/download-artifact@v4
        with:
          name: devore-windows-jar
          path: release
      - name: Delete old tag and releases
        run: |
          TAG=${{ needs.build-windows.outputs.version }}
          RELEASES=$(curl -s \
                        -H "Authorization: token $GITHUB_TOKEN" \
                        -H "Accept: application/vnd.github.v3+json" \
                        "https://api.github.com/repos/${{ github.repository }}/releases")
                      RELEASE_IDS=$(echo "$RELEASES" | jq -r ".[] | select(.tag_name == \"$TAG\") | .id")
                      for ID in $RELEASE_IDS; do
                        echo "Deleting release ID: $ID"
                        curl -s \
                          -X DELETE \
                          -H "Authorization: token $GITHUB_TOKEN" \
                          -H "Accept: application/vnd.github.v3+json" \
                          "https://api.github.com/repos/${{ github.repository }}/releases/$ID"
                      done
          if git ls-remote --tags origin | grep -q "refs/tags/${{ needs.build-windows.outputs.version }}"; then
            git push --delete origin "refs/tags/${{ needs.build-windows.outputs.version }}"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get JAR Path
        id: jar
        run: |
          echo "jar_path=$(ls release/*.jar | head -n 1)" >> $GITHUB_OUTPUT
      - name: Calculate SHA256
        id: calculate_sha
        run: |
          SHA256=$(sha256sum ${{ steps.jar.outputs.jar_path }} | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
      - name: Get timestamp
        id: timestamp
        run: echo "date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT
      - name: Create Release with fixed tag
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ needs.build-windows.outputs.version }}
          release_name: Devore Language
          draft: false
          prerelease: true
          body: |
            Version: ${{ needs.build-windows.outputs.version }}
            Build date: ${{ steps.timestamp.outputs.date }}
            Commit: ${{ github.sha }}
            SHA256: ${{ steps.calculate_sha.outputs.sha256 }}
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.jar.outputs.jar_path }}
          asset_name: devore-${{ needs.build-windows.outputs.version }}.jar
          asset_content_type: application/java-archive
