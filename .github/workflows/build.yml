name: Build and Release (dev)

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
permissions:
  contents: write
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'gradle'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Run DevoreTest
        run: ./gradlew test --tests 'org.devore.DevoreTest*'
      - name: Extract Gradle version
        id: gradle_version
        run: |
          VERSION=$(./gradlew properties -q | grep "version:" | awk '{print $2}' | tr -d "'\r\n ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Build with Gradle
        run: ./gradlew build
      - name: Delete old release and tag
        run: |
          TAG="${{ steps.gradle_version.outputs.version }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get JAR Path
        id: jar
        run: echo "jar_path=$(ls build/libs/*.jar | head -n 1)" >> $GITHUB_OUTPUT
      - name: Calculate SHA256
        id: calculate_sha
        run: |
          SHA256=$(sha256sum "${{ steps.jar.outputs.jar_path }}" | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
      - name: Get timestamp
        id: timestamp
        run: echo "date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT
      - name: Create prerelease
        run: |
          TAG="${{ steps.gradle_version.outputs.version }}"
          JAR="${{ steps.jar.outputs.jar_path }}"
          gh release create "$TAG" "$JAR" \
            --title "Devore Language" \
            --notes "Version: $TAG
          Build date: ${{ steps.timestamp.outputs.date }}
          Commit: ${{ github.sha }}
          SHA256: ${{ steps.calculate_sha.outputs.sha256 }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Check release status
        run: |
          TAG="${{ steps.gradle_version.outputs.version }}"
          gh release view "$TAG" --json isDraft,isPrerelease,tagName
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
