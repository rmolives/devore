name: Build and Release (dev)

on:
  push:
    branches:
      - 'main'
jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '8'
          distribution: 'temurin'
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
      - name: Extract Gradle version
        id: gradle_version
        run: |
          VERSION=$(./gradlew properties -q | grep "version:" | awk '{print $2}' | tr -d "'\r\n ")
          echo "Extracted version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
      - name: Build with Gradle
        run: ./gradlew build
      - name: Delete old release and tag
        run: |
          TAG="${{ steps.gradle_version.outputs.version }}"
          gh release delete "$TAG" --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Get JAR Path
        id: jar
        run: |
          echo "jar_path=$(ls build/libs/*.jar | head -n 1)" >> $GITHUB_OUTPUT
      - name: Calculate SHA256
        id: calculate_sha
        run: |
          SHA256=$(sha256sum ${{ steps.jar.outputs.jar_path }} | awk '{print $1}')
          echo "sha256=$SHA256" >> $GITHUB_OUTPUT
          echo "SHA256: $SHA256"
      - name: Get timestamp
        id: timestamp
        run: echo "date=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S CST')" >> $GITHUB_OUTPUT
      - name: Create prerelease
        run: |
          TAG="${{ steps.gradle_version.outputs.version }}"
          JAR="${{ steps.jar.outputs.jar_path }}"
          gh release create "$TAG" "$JAR" \
            --title "Devore Language" \
            --notes "Version: $TAG
          Build date: ${{ steps.timestamp.outputs.date }}
          Commit: ${{ github.sha }}
          SHA256: ${{ steps.calculate_sha.outputs.sha256 }}" \
            --prerelease
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload Release Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ${{ steps.jar.outputs.jar_path }}
          asset_name: devore-${{ steps.gradle_version.outputs.version }}.jar
          asset_content_type: application/java-archive
